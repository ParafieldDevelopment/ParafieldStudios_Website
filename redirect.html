<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parafield_OS // REDIRECT_NOTICE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <style>
        body { 
            background: #080808; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }
        .redirect-container {
            max-width: 600px;
            width: 90%;
            padding: 4rem 3rem;
            background: #111;
            border: 1px solid rgba(242,174,73,0.1);
            position: relative;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .redirect-hud {
            position: absolute;
            top: 1rem; left: 1rem;
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--primary);
            opacity: 0.5;
            letter-spacing: 2px;
        }
        .warning-icon { 
            width: 80px; 
            margin-bottom: 2rem; 
            filter: invert(72%) sepia(60%) saturate(500%) hue-rotate(340deg) brightness(100%);
            animation: pulse-warn 2s ease-in-out infinite;
        }
        @keyframes pulse-warn {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .url-box {
            background: #000;
            border: 1px dashed rgba(242,174,73,0.3);
            padding: 1.2rem;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--primary);
            word-break: break-all;
            margin: 2.5rem 0;
            text-align: left;
        }
        .btn-group { display: flex; gap: 1.5rem; justify-content: center; }
        .btn {
            padding: 14px 28px;
            text-decoration: none;
            font-weight: 900;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            font-family: var(--mono);
        }
        .btn-back { color: var(--white); border: 1.5px solid rgba(255,255,255,0.1); }
        .btn-go { background: var(--primary); color: #080808; }
        .btn:hover { transform: translateY(-3px); }
        .btn-go:hover { background: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .btn-back:hover { border-color: #fff; color: #fff; }
        
        .funny-text { 
            margin-top: 3rem; 
            font-family: var(--mono);
            color: rgba(255,255,255,0.15); 
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* HUD Brackets */
        .b-corner { position: absolute; width: 20px; height: 20px; border: 2px solid var(--primary); opacity: 0.3; }
        .b-tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .b-tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .b-bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .b-br { bottom: -2px; right: -2px; border-left: none; border-top: none; }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="redirect-hud">[ SEC_LINK_PROTECT_v4.0 ]</div>
        <div class="b-corner b-tl"></div><div class="b-corner b-tr"></div>
        <div class="b-corner b-bl"></div><div class="b-corner b-br"></div>
        
        <img src="assets/warning.svg" class="warning-icon" alt="Warning">
        <h1 style="font-size: 2.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 1rem;">LEAVING<br><span style="color: var(--primary);">SYSTEM</span></h1>
        <p style="font-size: 0.9rem; color: var(--dim); line-height: 1.6; max-width: 400px; margin: 0 auto;">You are attempting to access an external domain. System security cannot be guaranteed beyond this point.</p>
        
        <div id="url-display" class="url-box">TARGET_URL: Loading...</div>
        
        <div class="btn-group">
            <a href="javascript:history.back()" class="btn btn-back">Abort</a>
            <a href="#" id="continue-link" class="btn btn-go">Authorize Access</a>
        </div>
        
        <p id="funny-text" class="funny-text"></p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let targetUrl = params.get('url');
        
        if (targetUrl) {
            if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
                targetUrl = 'https://' + targetUrl;
            }
            document.getElementById('url-display').textContent = `EXTERNAL_NODE: ${targetUrl}`;
            document.getElementById('continue-link').href = targetUrl;
        } else {
            document.getElementById('url-display').textContent = "ERROR: NO_DESTINATION_SPECIFIED";
            document.getElementById('continue-link').style.display = 'none';
        }

        const funnyTexts = [
            "Careful where you step.",
            "The internet is a scary place.",
            "Don't say we didn't warn you.",
            "Leaving the safety of the studio...",
            "Watch out for dragons.",
            "Tell them Parafield sent you.",
            "Remember to hydrate while you're out there.",
            "Wait, did you leave the oven on?",
            "NO! DON'T LEAVE ME HERE!",
            "MICHAEL DONT LEAVE ME HERE MICHAEL!!!",
            "You're entering the wild west of the web.",
            "Farewell, brave traveler."
        ];

        document.getElementById('funny-text').textContent = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
    </script>
</body>
</html>
