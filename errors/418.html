<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>418 - I'm a Teapot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/404.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <style>
        /* Animation keyframes */
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes tilt {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        /* Staggered animation for container children */
        .container > * {
            opacity: 0;
            transform: scale(0.8);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        /* Specific animation delays */
        .container h1 { animation-delay: 0.2s; }
        .container p:nth-of-type(1) { animation-delay: 0.3s; } /* Main descriptive paragraph */
        .container .home-link { animation-delay: 0.4s; }
        .container .funny-section { animation-delay: 0.5s; }

        /* Existing styles for teapot-img, now combining animations */
        .teapot-img {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            display: inline-block;
            /* Initial state for bounceIn */
            opacity: 0;
            transform: scale(0.8);
            /* Combine bounceIn and tilt animations */
            animation:
                bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.1s forwards, /* bounceIn with delay */
                tilt 2s infinite ease-in-out 0.9s; /* tilt starts after bounceIn finishes (0.8s + 0.1s delay) */
            /* filter: invert(1); Removed as requested */
        }

        .teapot-img:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <script src="../js/external-redirect.js"></script>
    <div class="container">
        <img src="../assets/teapot.svg" alt="I'm a teapot" class="teapot-img">

        <h1>418</h1>
        <p>I'm a teapot. I cannot brew coffee.</p>
        <a href="../index.html" class="home-link">Go back to Home</a>

        <div class="funny-section">
            <p class="error-code">Error Code: 418</p>
            <p id="funny-text" class="funny-text"></p>
        </div>
    </div>

    <script src="../js/external-redirect.js"></script>
    <script>
        const funnyTexts = [
            "Short and stout.",
            "Here is my handle, here is my spout.",
            "Tip me over and pour me out!",
            "Why are you asking a teapot for a webpage?",
            "HTCPCP implementation not found.",
            "I'm steaming mad!",
            "Would you like some Earl Grey instead?",
            "Don't judge me, it's a living.",
            "I brew content, not coffee.",
            "Polly, put the kettle on!",
            "Everything is better with a spot of tea.",
            "418: The most useful error code ever conceived."
        ];

        const funnyTextElement = document.getElementById('funny-text');
        const randomIndex = Math.floor(Math.random() * funnyTexts.length);
        funnyTextElement.innerHTML = funnyTexts[randomIndex];
    </script>
</body>
</html>
