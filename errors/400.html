<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - Bad Request</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/404.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <style>
        /* Animation styles */
        body {
            /* Keep body visible initially, individual elements will be hidden */
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .container > * {
            opacity: 0;
            transform: scale(0.8);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .container .error-img { animation-delay: 0.1s; }
        .container h1 { animation-delay: 0.2s; }
        .container p:nth-of-type(1) { animation-delay: 0.3s; } /* Main descriptive paragraph */
        .container .home-link { animation-delay: 0.4s; }
        .container .funny-section { animation-delay: 0.5s; }

        /* Existing styles */
        .error-img {
            width: 260px; /* Adjust size as needed */
            /*height: 306px;*/
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="../assets/BadRequest.png" alt="Bad Request" class="error-img">
        <h1>400</h1>
        <p>Bad Request. Your request was malformed.</p>
        <a href="../index.html" class="home-link">Go back to Home</a>

        <div class="funny-section">
            <p class="error-code">Error Code: 400</p>
            <p id="funny-text" class="funny-text"></p>
        </div>
    </div>

    <script src="../js/external-redirect.js" defer></script>
    <script>
        const funnyTexts = [
            "Oops! Your request seems a bit... off.",
            "Did you forget something? Or add too much?",
            "The server couldn't understand what you meant.",
            "That's not how we do things around here.",
            "Houston, we have a syntax error.",
            "Request malformed. Please try again, but better.",
            "Even I'm confused by that request.",
            "Maybe you forgot your CHATGPT Wifiu API key buddy.",
            "Do fucking better.",
            "Is this even English?",
            "My cat types better requests than this.",
            "Error 400: Brain not found in request.",
            "Are you sure you're not a robot? A broken one?",
            "This request needs a timeout.",
            "We've seen better requests from a toaster.",
            "Please consult the manual for 'how to make a proper request'.",
            "Your request went to the Bad Request dimension.",
            "Even the pixels are confused by this one.",
            "Consider this a 'redo' button for your request.",
            "Your request is so bad it's almost impressive.",
            "I've seen some bad requests, but this? This is special.",
            "Are you typing with your elbows?",
            "The server just did a facepalm.",
            "400: User logic failed to compile."
        ];

        const funnyTextElement = document.getElementById('funny-text');
        const randomIndex = Math.floor(Math.random() * funnyTexts.length);
        funnyTextElement.innerHTML = funnyTexts[randomIndex];
    </script>
</body>
</html>
