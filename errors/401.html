<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 - Unauthorized</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/404.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <style>
        /* Animation styles */
        body {
            /* Keep body visible initially, individual elements will be hidden */
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .container > * {
            opacity: 0;
            transform: scale(0.8);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .container .error-img { animation-delay: 0.1s; }
        .container h1 { animation-delay: 0.2s; }
        .container p:nth-of-type(1) { animation-delay: 0.3s; } /* Main descriptive paragraph */
        .container .home-link { animation-delay: 0.4s; }
        .container .funny-section { animation-delay: 0.5s; }

        /* Existing styles */
        .error-img {
            width: 320px; /* Adjust size as needed */
            height: 306px;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <script src="../js/external-redirect.js"></script>
    <div class="container">
        <img src="../assets/ParafieldForbidden.png" alt="Unauthorized" class="error-img">
        <h1>401</h1>
        <p>Unauthorized. Please provide valid credentials.</p>
        <a href="../index.html" class="home-link">Go back to Home</a>

        <div class="funny-section">
            <p class="error-code">Error Code: 401</p>
            <p id="funny-text" class="funny-text"></p>
        </div>
    </div>

    <script src="../js/external-redirect.js"></script>
    <script>
        const funnyTexts = [
            "Who are you? And why are you here?",
            "You shall not pass... without proper authentication!",
            "Access denied. Have you tried logging in?",
            "This content requires a secret handshake.",
            "Looks like you're missing a key.",
            "I'm afraid I can't let you do that, Dave. (Without authentication)",
            "Permission denied. Check your credentials.",
            "Windows User Account Control has denied your access. Find something else to do.",
            "Are you on the guest list? No? Then scram!",
            "Unauthorized access detected. Initiating self-destruct sequence... just kidding!",
            "Did you bring the secret decoder ring?",
            "Even the server is raising an eyebrow at you.",
            "You need more badges to enter this area.",
            "Access level insufficient. Please upgrade your permissions (or your charm).",
            "This isn't a free sample, you know.",
            "The bouncer says 'no'.",
            "Try knocking louder next time, with credentials.",
            "My security system is judging you right now.",
            "FUCKING LOG-IN DAMN IT!",
            "Are you Parafield Agent? If not, fuck off..",
            "FUCK YOU AND FUCK OFF!",
            "I don't know you. You don't know me. Let's keep it that way until you log in.",
            "Password: 'Password123' didn't work? Shocker.",
            "Nice try, but I need ID. And a login.",
            "This is a VIP area. You are currently... not a VIP.",
            "401: Identity crisis in progress."
        ];

        const funnyTextElement = document.getElementById('funny-text');
        const randomIndex = Math.floor(Math.random() * funnyTexts.length);
        funnyTextElement.innerHTML = funnyTexts[randomIndex];
    </script>
</body>
</html>
