<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/404.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <style>
        /* Animation styles */
        body {
            /* Keep body visible initially, individual elements will be hidden */
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .container > * {
            opacity: 0;
            transform: scale(0.8);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .container .not-found-image { animation-delay: 0.1s; }
        .container h1 { animation-delay: 0.2s; }
        .container p:nth-of-type(1) { animation-delay: 0.3s; } /* Main descriptive paragraph */
        .container .home-link { animation-delay: 0.4s; }
        .container .funny-section { animation-delay: 0.5s; }

        /* Existing styles */
    </style>
</head>
<body>
    <div class="container">
        <img src="../assets/404.png" alt="404 Not Found" class="not-found-image">
        <h1>404</h1>
        <p>Oops! The page you're looking for doesn't exist.</p>
        <a href="../index.html" class="home-link">Go back to Home</a>

        <div class="funny-section">
            <p class="error-code">Error Code: 404</p>
            <p id="funny-text" class="funny-text"></p>
        </div>
    </div>

    <script src="../js/external-redirect.js" defer></script>
    <script>
        const funnyTexts = [
            "Well that's an error.",
            "What were you even trying to search?",
            "WHOOPS!",
            "Error, cannot find hot singles in ur area.. Would you like to try searching for the nearest gym?",
            "Whatever you were looking for. Caseoh might have eaten it already.",
            "I CAN'T FIND MY CRACK! WHERE THE FUCK IS IT?!",
            " \"That's not...the...ThornRing, is it...?\" ",
            "if you keep searching for pages that don't exist... <b id='san'>you're gonna have a bad time.</b>",
            "This page is like a father who went to buy milk... it never came back.",
            "404: The page took a permanent vacation.",
            "I searched everywhere. Under the rug, in the attic... nothing.",
            "Maybe the page is just shy and hiding?",
            "You've reached the end of the internet. Please turn back."
        ];

        const funnyTextElement = document.getElementById('funny-text');
        const randomIndex = Math.floor(Math.random() * funnyTexts.length);
        funnyTextElement.innerHTML = funnyTexts[randomIndex];

        document.getElementById('san').addEventListener('click', () => {
            window.open('https://jcw87.github.io/c2-sans-fight/')
        })
    </script>
</body>
</html>
