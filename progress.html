<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <meta charset="UTF-8">
    <title>Parafield Studios - Progress</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/banner-theme.css">
</head>
<body>
    <script src="js/config-handler.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/scroll-animations.js"></script>
    <script src="js/dynamicity.js"></script>
    <script src="js/view-transitions.js"></script>
    <script src="js/progress-handler.js"></script>
    
    <nav class="nav">
        <div class="nav-left">
            <img src="assets/logo.svg" alt="logo" class="nav-logo">
        </div>

        <button class="nav-toggle" aria-label="toggle navigation">
            <span class="hamburger"></span>
        </button>

        <div class="nav-buttons">
            <a href="index.html" class="nav-button">Home</a>
            <a href="about.html" class="nav-button">About</a>
            <a href="careers.html" class="nav-button">Careers</a>
            <a href="https://learn.parafieldstudios.com" class="nav-button">Learn</a>
        </div>
    </nav>

    <div class="banner scroll-on">
        <div class="banner-text scroll-on">
            <h1>DEVELOPMENT</h1>
            <h1>PROGRESS</h1>
        </div>
    </div>

    <main class="content">
        <section class="intro-section scroll-on">
            <h2 class="section-title">System Status</h2>
            <p class="section-subtitle">Accessing Parafield Mainframe... Data loaded.</p>
        </section>

        <div class="crt-screen">
            <div id="crt-progress-list">
                <!-- Dynamically loaded from progress.json -->
                <p class="crt-status">INITIALIZING LINK...</p>
            </div>
        </div>

        <hr class="section-divider">
        
        <section class="intro-section scroll-on">
            <p class="studio-description-sub">Note: Progress values are estimates and subject to change based on how much coffee we drink.</p>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-left">
                <img src="assets/ParafieldStudiosWhite.png" alt="Parafield Studios" class="footer-logo">
                <p class="footer-copyright">&copy; 2026 Parafield Studios<br>All rights reserved.</p>
            </div>
            <div class="footer-center">
                <div class="footer-links-group">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="careers.html">Careers</a>
                </div>
            </div>
            <div class="footer-right">
                <div class="social-icons">
                    <a href="https://x.com/ParafieldStudio" target="_blank">
                        <img src="assets/Twitter.png" alt="Twitter" class="social-icon">
                    </a>
                </div>
            </div>
        </div>
    </footer>
    <script src="js/footer-legal.js"></script>
</body>
</html>
